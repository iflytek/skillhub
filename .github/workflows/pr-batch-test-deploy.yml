name: PR Batch Test Deploy

on:
  workflow_dispatch:
    inputs:
      tail_lines:
        description: "How many log lines to print per service"
        required: false
        default: "250"
        type: string

jobs:
  inspect-runtime:
    name: Inspect HK Test Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate deploy secrets
        env:
          TEST_RUNTIME_SSH_HOST: ${{ secrets.TEST_RUNTIME_SSH_HOST }}
          TEST_RUNTIME_SSH_KEY: ${{ secrets.TEST_RUNTIME_SSH_KEY }}
        run: |
          [[ -n "${TEST_RUNTIME_SSH_HOST}" ]] || { echo "::error::Missing secret TEST_RUNTIME_SSH_HOST"; exit 1; }
          [[ -n "${TEST_RUNTIME_SSH_KEY}" ]] || { echo "::error::Missing secret TEST_RUNTIME_SSH_KEY"; exit 1; }

      - name: Prepare SSH key
        id: ssh
        env:
          TEST_RUNTIME_SSH_KEY: ${{ secrets.TEST_RUNTIME_SSH_KEY }}
        run: |
          key_file="${RUNNER_TEMP}/test-runtime.key"
          printf '%s\n' "${TEST_RUNTIME_SSH_KEY}" > "${key_file}"
          chmod 600 "${key_file}"
          echo "key_file=${key_file}" >> "${GITHUB_OUTPUT}"

      - name: Probe remote runtime permissions and logs
        env:
          TEST_RUNTIME_SSH_HOST: ${{ secrets.TEST_RUNTIME_SSH_HOST }}
          TEST_RUNTIME_SSH_USER: ${{ secrets.TEST_RUNTIME_SSH_USER }}
          TEST_RUNTIME_SSH_PORT: ${{ secrets.TEST_RUNTIME_SSH_PORT }}
          TAIL_LINES: ${{ inputs.tail_lines }}
        run: |
          ssh_port="${TEST_RUNTIME_SSH_PORT:-22}"
          ssh_user="${TEST_RUNTIME_SSH_USER:-skillhub-deploy}"
          ssh -i "${{ steps.ssh.outputs.key_file }}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=10 \
            -p "${ssh_port}" \
            "${ssh_user}@${TEST_RUNTIME_SSH_HOST}" bash -s -- "${TAIL_LINES:-250}" <<'REMOTE'
          set -euo pipefail
          tail_lines="$1"

          echo '=== identity ==='
          id || true
          groups || true
          echo

          echo '=== sudo -n -l ==='
          sudo -n -l || true
          echo

          echo '=== runtime dir perms ==='
          ls -ld /opt /opt/skillhub-runtime || true
          echo

          echo '=== docker ps (user) ==='
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' || true
          echo

          echo '=== docker ps (sudo) ==='
          sudo -n docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' || true
          echo

          echo '=== server inspect (user) ==='
          docker inspect skillhub-runtime-server-1 --format '{{json .State}}' || true
          echo

          echo '=== server inspect (sudo) ==='
          sudo -n docker inspect skillhub-runtime-server-1 --format '{{json .State}}' || true
          echo

          echo '=== server logs (user) ==='
          docker logs --tail "$tail_lines" skillhub-runtime-server-1 || true
          echo

          echo '=== server logs (sudo) ==='
          sudo -n docker logs --tail "$tail_lines" skillhub-runtime-server-1 || true
          echo

          echo '=== deployment metadata (sudo) ==='
          sudo -n cat /opt/skillhub-runtime/manual-test-deployment.txt || true
          echo

          echo '=== selected env (sudo) ==='
          sudo -n sh -lc 'grep -E "^(SKILLHUB_VERSION|SKILLHUB_STORAGE_PROVIDER|SKILLHUB_SECURITY_SCANNER_ENABLED|BOOTSTRAP_ADMIN_ENABLED|WEB_PORT|POSTGRES_DB|POSTGRES_USER)=" /opt/skillhub-runtime/.env.release' || true
          REMOTE
