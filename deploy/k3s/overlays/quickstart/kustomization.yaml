apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skillhub

resources:
  - namespace.yaml
  - postgres-statefulset.yaml
  - redis-statefulset.yaml
  - configmap.yaml
  - services.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - scanner-deployment.yaml
  - ingress.yaml
  - secret.yaml

images:
  - name: ghcr.io/iflytek/skillhub-server
    newTag: latest
  - name: ghcr.io/iflytek/skillhub-web
    newTag: latest
  - name: ghcr.io/iflytek/skillhub-scanner
    newTag: latest

patches:
  # 移除 nginx ingressClassName，适配 k3s 默认 Traefik
  - target:
      kind: Ingress
      name: skillhub
    patch: |
      - op: remove
        path: /spec/ingressClassName
  # 修改默认域名为 skillhub.local，方便本地 /etc/hosts 测试
  - target:
      kind: Ingress
      name: skillhub
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: skillhub.local

labels:
  - pairs:
      app.kubernetes.io/part-of: skillhub
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/deployment: k3s-quickstart
